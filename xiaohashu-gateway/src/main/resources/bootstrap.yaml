server:
  port: 8000 # 指定启动端口
spring:
  cloud:
    gateway:
      routes:
        - id: auth
          uri: lb://xiaohashu-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: user
          uri: lb://xiaohashu-user
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: id
          uri: lb://xiaohashu-distributed-id-generator
          predicates:
            - Path=/id/**
          filters:
            - StripPrefix=1
        - id: kv
          uri: lb://xiaohashu-kv
          predicates:
            - Path=/kv/**
          filters:
            - StripPrefix=1
        - id: oss
          uri: lb://xiaohashu-oss
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1